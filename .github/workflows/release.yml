name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Verify release notes file
        run: |
          notes_file="docs/releases/${VERSION}.md"
          echo "RELEASE_NOTES_FILE=$notes_file" >> "$GITHUB_ENV"

          if [ ! -f "$notes_file" ]; then
            echo "Missing release notes file: $notes_file" >&2
            exit 1
          fi

          if [ ! -s "$notes_file" ]; then
            echo "Release notes file is empty: $notes_file" >&2
            exit 1
          fi

          body="$(cat "$notes_file")"
          if printf '%s' "$body" | grep -Eq '^\*\*Full Changelog\*\*:'; then
            echo "Release notes file is only a changelog link" >&2
            exit 1
          fi

      - name: Publish release assets
        run: |
          for runtime in linux-x64 win-x64; do
            output_dir="artifacts/$runtime"

            dotnet publish src/move/move.csproj \
              -c Release \
              -r "$runtime" \
              --self-contained true \
              -p:PublishSingleFile=true \
              -p:DebugType=None \
              -p:DebugSymbols=false \
              -p:Version="$VERSION" \
              -o "$output_dir"

            if [ "$runtime" = "linux-x64" ]; then
              tar -C "$output_dir" -czf "move-${VERSION}-${runtime}.tar.gz" .
            else
              (
                cd "$output_dir"
                zip -r "../../move-${VERSION}-${runtime}.zip" .
              )
            fi
          done

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --notes-file "$RELEASE_NOTES_FILE" \
            "move-${VERSION}-linux-x64.tar.gz" \
            "move-${VERSION}-win-x64.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release notes
        run: |
          body="$(gh release view "$GITHUB_REF_NAME" --json body --jq .body)"

          if [ -z "$body" ]; then
            echo "Release body is empty" >&2
            exit 1
          fi

          if printf '%s' "$body" | grep -Eq '^\*\*Full Changelog\*\*:'; then
            echo "Release body is only a changelog link" >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
