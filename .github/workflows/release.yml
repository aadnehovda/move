name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish release assets
        run: |
          for runtime in linux-x64 win-x64; do
            output_dir="artifacts/$runtime"

            dotnet publish src/move/move.csproj \
              -c Release \
              -r "$runtime" \
              --self-contained true \
              -p:PublishSingleFile=true \
              -p:DebugType=None \
              -p:DebugSymbols=false \
              -p:Version="$VERSION" \
              -o "$output_dir"

            if [ "$runtime" = "linux-x64" ]; then
              tar -C "$output_dir" -czf "move-${VERSION}-${runtime}.tar.gz" .
            else
              (
                cd "$output_dir"
                zip -r "../../move-${VERSION}-${runtime}.zip" .
              )
            fi
          done

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            "move-${VERSION}-linux-x64.tar.gz" \
            "move-${VERSION}-win-x64.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
