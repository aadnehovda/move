name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish linux-x64
        run: |
          dotnet publish move.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:Version="$VERSION" \
            -o artifacts/linux-x64

      - name: Package linux-x64
        run: |
          tar -C artifacts/linux-x64 -czf "move-${VERSION}-linux-x64.tar.gz" .

      - name: Publish win-x64
        run: |
          dotnet publish move.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:Version="$VERSION" \
            -o artifacts/win-x64

      - name: Package win-x64
        run: |
          cd artifacts/win-x64
          zip -r "../../move-${VERSION}-win-x64.zip" .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            move-${{ env.VERSION }}-linux-x64.tar.gz
            move-${{ env.VERSION }}-win-x64.zip
